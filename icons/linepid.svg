<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- ground / track -->
  <rect x="1" y="22" width="30" height="9" fill="#0D1117"/>
  <!-- the line being tracked -->
  <path d="M 2 30 Q 16 22 30 26" fill="none" stroke="#FFD740" stroke-width="2" stroke-linecap="round"/>
  <!-- sensor array (5 sensors) under car -->
  <circle cx="8" cy="20" r="1.5" fill="#81C784"/>
  <circle cx="12" cy="20" r="1.5" fill="#81C784"/>
  <circle cx="16" cy="20" r="1.5" fill="#FFD740"/>
  <circle cx="20" cy="20" r="1.5" fill="#81C784"/>
  <circle cx="24" cy="20" r="1.5" fill="#81C784"/>
  <!-- car body -->
  <rect x="6" y="9" width="20" height="10" rx="2" fill="#0D1117" stroke="#81C784" stroke-width="1.5"/>
  <!-- car windshield -->
  <line x1="10" y1="9" x2="13" y2="14" stroke="#81C784" stroke-width="1"/>
  <line x1="22" y1="9" x2="19" y2="14" stroke="#81C784" stroke-width="1"/>
  <line x1="13" y1="14" x2="19" y2="14" stroke="#81C784" stroke-width="1"/>
  <!-- PID label -->
  <text x="16" y="12" text-anchor="middle" font-family="monospace" font-size="3.5" fill="#81C784" font-weight="bold">PID</text>
  <!-- wheels -->
  <circle cx="9" cy="19" r="2" fill="#0D1117" stroke="#81C784" stroke-width="1"/>
  <circle cx="23" cy="19" r="2" fill="#0D1117" stroke="#81C784" stroke-width="1"/>
</svg>
