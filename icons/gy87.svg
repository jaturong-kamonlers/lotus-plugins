<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- PCB board background -->
  <rect x="3" y="6" width="26" height="20" rx="1.5" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.4"/>
  <!-- IC chips (3 sensors in package) -->
  <rect x="6" y="9" width="6" height="5" fill="#0D1117" stroke="#4FC3F7" stroke-width="0.8"/>
  <text x="9" y="13" text-anchor="middle" font-family="monospace" font-size="2.5" fill="#4FC3F7">MPU</text>
  <rect x="13" y="9" width="6" height="5" fill="#0D1117" stroke="#4FC3F7" stroke-width="0.8"/>
  <text x="16" y="13" text-anchor="middle" font-family="monospace" font-size="2.5" fill="#4FC3F7">HMC</text>
  <rect x="20" y="9" width="6" height="5" fill="#0D1117" stroke="#4FC3F7" stroke-width="0.8"/>
  <text x="23" y="13" text-anchor="middle" font-family="monospace" font-size="2.5" fill="#4FC3F7">BMP</text>
  <!-- 3-axis arrows in middle -->
  <line x1="16" y1="20" x2="22" y2="17" stroke="#FF6E40" stroke-width="1.4" stroke-linecap="round"/>
  <polygon points="22,17 20,16.2 21.5,18.5" fill="#FF6E40"/>
  <line x1="16" y1="20" x2="10" y2="17" stroke="#69F0AE" stroke-width="1.4" stroke-linecap="round"/>
  <polygon points="10,17 12,16.2 10.5,18.5" fill="#69F0AE"/>
  <line x1="16" y1="20" x2="16" y2="14" stroke="#FFD740" stroke-width="1.4" stroke-linecap="round"/>
  <polygon points="16,14 14.7,15.4 17.3,15.4" fill="#FFD740"/>
  <!-- pin headers bottom -->
  <line x1="6" y1="26" x2="6" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="10" y1="26" x2="10" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="14" y1="26" x2="14" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="18" y1="26" x2="18" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="22" y1="26" x2="22" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="26" y1="26" x2="26" y2="29" stroke="#4FC3F7" stroke-width="1"/>
</svg>
