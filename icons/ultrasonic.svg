<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- HC-SR04 module body with two eyes -->
  <rect x="3" y="11" width="14" height="9" rx="1" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.4"/>
  <!-- TX speaker -->
  <circle cx="7" cy="15.5" r="2.6" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.1"/>
  <circle cx="7" cy="15.5" r="1" fill="#4FC3F7"/>
  <!-- RX mic -->
  <circle cx="13" cy="15.5" r="2.6" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.1"/>
  <circle cx="13" cy="15.5" r="1" fill="#4FC3F7"/>
  <!-- emitted sound arcs -->
  <path d="M 19 15.5 Q 22 12 25 15.5" fill="none" stroke="#4FC3F7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 19 15.5 Q 23 11 27 15.5" fill="none" stroke="#4FC3F7" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 19 15.5 Q 24 10 29 15.5" fill="none" stroke="#4FC3F7" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- target / wall -->
  <line x1="28" y1="7" x2="28" y2="24" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- 4 wires bottom (VCC/TRIG/ECHO/GND) -->
  <line x1="5" y1="20" x2="5" y2="24" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="8" y1="20" x2="8" y2="24" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="12" y1="20" x2="12" y2="24" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="15" y1="20" x2="15" y2="24" stroke="#4FC3F7" stroke-width="1"/>
</svg>
