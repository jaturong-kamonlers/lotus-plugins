<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- IR sensor body (round can) -->
  <circle cx="9" cy="16" r="6" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.4"/>
  <!-- sensor lens -->
  <circle cx="9" cy="16" r="2.5" fill="#4FC3F7"/>
  <circle cx="9" cy="16" r="1" fill="#0D1117"/>
  <!-- 4 leads at bottom -->
  <line x1="6" y1="22" x2="6" y2="25" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="8" y1="22" x2="8" y2="25" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="10" y1="22" x2="10" y2="25" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="12" y1="22" x2="12" y2="25" stroke="#4FC3F7" stroke-width="1"/>
  <!-- IR beam (dashed) -->
  <line x1="16" y1="16" x2="24" y2="16" stroke="#FF6E40" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2,1.5"/>
  <!-- target object (small flame/heat icon) -->
  <path d="M 27 16 C 25 12 26 10 27 8 C 28 10 30 12 28 16 C 29 18 27 19 27 16 Z" fill="#FF6E40" stroke="#FF6E40" stroke-width="1"/>
  <!-- heat waves above target -->
  <path d="M 25 6 Q 26 4 27 6" fill="none" stroke="#FF6E40" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M 27.5 4.5 Q 28.5 2.5 29.5 4.5" fill="none" stroke="#FF6E40" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
