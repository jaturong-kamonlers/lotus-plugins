<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- PCB outline -->
  <rect x="3" y="4" width="26" height="24" rx="1.5" fill="#0D1117" stroke="#FFB74D" stroke-width="1.4"/>
  <!-- IC chip in center -->
  <rect x="11" y="11" width="10" height="6" rx="0.5" fill="#0D1117" stroke="#FFB74D" stroke-width="1"/>
  <text x="16" y="15.2" text-anchor="middle" font-family="monospace" font-size="3" fill="#FFB74D">PCA</text>
  <!-- left 8 servo headers (3 pins each = thin rects) -->
  <line x1="5" y1="6"  x2="9" y2="6"  stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="8"  x2="9" y2="8"  stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="10" x2="9" y2="10" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="19" x2="9" y2="19" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="21" x2="9" y2="21" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="23" x2="9" y2="23" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="5" y1="25" x2="9" y2="25" stroke="#FFB74D" stroke-width="1.2"/>
  <!-- right 8 servo headers -->
  <line x1="23" y1="6"  x2="27" y2="6"  stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="8"  x2="27" y2="8"  stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="10" x2="27" y2="10" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="19" x2="27" y2="19" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="21" x2="27" y2="21" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="23" x2="27" y2="23" stroke="#FFB74D" stroke-width="1.2"/>
  <line x1="23" y1="25" x2="27" y2="25" stroke="#FFB74D" stroke-width="1.2"/>
  <!-- I2C bus indicator at top -->
  <line x1="12" y1="6" x2="20" y2="6" stroke="#4FC3F7" stroke-width="1.3"/>
  <text x="16" y="9" text-anchor="middle" font-family="monospace" font-size="2.5" fill="#4FC3F7">I²C</text>
  <!-- 16 indicator -->
  <text x="16" y="26" text-anchor="middle" font-family="monospace" font-size="3.5" fill="#FFB74D" font-weight="bold">×16</text>
</svg>
