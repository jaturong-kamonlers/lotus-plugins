<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- pressure gauge dial -->
  <circle cx="16" cy="14" r="9" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.5"/>
  <!-- tick marks at 4 corners -->
  <line x1="16" y1="6.5" x2="16" y2="8" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="23.5" y1="14" x2="22" y2="14" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="16" y1="21.5" x2="16" y2="20" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="8.5" y1="14" x2="10" y2="14" stroke="#4FC3F7" stroke-width="1"/>
  <!-- needle pointing upper-right -->
  <line x1="16" y1="14" x2="20.5" y2="10" stroke="#4FC3F7" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="16" cy="14" r="1.3" fill="#4FC3F7"/>
  <!-- thermometer beside dial -->
  <rect x="26" y="8" width="2.5" height="11" rx="1.2" fill="#0D1117" stroke="#FF6E40" stroke-width="1"/>
  <rect x="26.5" y="14" width="1.5" height="5" fill="#FF6E40"/>
  <circle cx="27.25" cy="20.5" r="2" fill="#FF6E40"/>
  <!-- baseline / IC pins -->
  <line x1="11" y1="27" x2="11" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="14" y1="27" x2="14" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="17" y1="27" x2="17" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="20" y1="27" x2="20" y2="29" stroke="#4FC3F7" stroke-width="1"/>
  <rect x="9" y="24" width="13" height="3" rx="1" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.2"/>
</svg>
