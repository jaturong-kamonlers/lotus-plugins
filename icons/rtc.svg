<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- clock face -->
  <circle cx="16" cy="16" r="11" fill="#0D1117" stroke="#4FC3F7" stroke-width="1.5"/>
  <!-- 12, 3, 6, 9 marks -->
  <line x1="16" y1="6" x2="16" y2="8" stroke="#4FC3F7" stroke-width="1.4"/>
  <line x1="24" y1="16" x2="22" y2="16" stroke="#4FC3F7" stroke-width="1.4"/>
  <line x1="16" y1="26" x2="16" y2="24" stroke="#4FC3F7" stroke-width="1.4"/>
  <line x1="8" y1="16" x2="10" y2="16" stroke="#4FC3F7" stroke-width="1.4"/>
  <!-- minute hand (10:10 classic) -->
  <line x1="16" y1="16" x2="10.5" y2="11" stroke="#4FC3F7" stroke-width="1.8" stroke-linecap="round"/>
  <!-- hour hand -->
  <line x1="16" y1="16" x2="20" y2="11.5" stroke="#FFB74D" stroke-width="2.2" stroke-linecap="round"/>
  <!-- second hand -->
  <line x1="16" y1="16" x2="20" y2="22" stroke="#EF5350" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <!-- center pin -->
  <circle cx="16" cy="16" r="1.3" fill="#FF6E40"/>
  <!-- crystal label (DS1307 hint) -->
  <text x="16" y="20.5" text-anchor="middle" font-family="monospace" font-size="2.6" fill="#4FC3F7" opacity="0.8">1307</text>
</svg>
