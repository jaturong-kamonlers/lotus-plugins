<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- HuskyLens device body (square camera module) -->
  <rect x="4" y="6" width="24" height="20" rx="1.5" fill="#0D1117" stroke="#BA68C8" stroke-width="1.5"/>
  <!-- screen area -->
  <rect x="6" y="8" width="20" height="14" fill="#0D1117" stroke="#BA68C8" stroke-width="1" opacity="0.9"/>
  <!-- camera lens -->
  <circle cx="16" cy="15" r="4.5" fill="#0D1117" stroke="#BA68C8" stroke-width="1.4"/>
  <circle cx="16" cy="15" r="2.5" fill="#BA68C8"/>
  <circle cx="14.8" cy="13.8" r="0.8" fill="#FFFFFF" opacity="0.9"/>
  <!-- detection box (corners only, AI-style) -->
  <line x1="6" y1="8" x2="9" y2="8" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="6" y1="8" x2="6" y2="11" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="23" y1="8" x2="26" y2="8" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="26" y1="8" x2="26" y2="11" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="6" y1="22" x2="9" y2="22" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="6" y1="19" x2="6" y2="22" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="23" y1="22" x2="26" y2="22" stroke="#FFD740" stroke-width="1.3"/>
  <line x1="26" y1="19" x2="26" y2="22" stroke="#FFD740" stroke-width="1.3"/>
  <!-- pin headers bottom -->
  <line x1="9" y1="26" x2="9" y2="29" stroke="#BA68C8" stroke-width="1"/>
  <line x1="14" y1="26" x2="14" y2="29" stroke="#BA68C8" stroke-width="1"/>
  <line x1="18" y1="26" x2="18" y2="29" stroke="#BA68C8" stroke-width="1"/>
  <line x1="23" y1="26" x2="23" y2="29" stroke="#BA68C8" stroke-width="1"/>
</svg>
