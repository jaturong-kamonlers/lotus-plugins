<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- base -->
  <rect x="11" y="26" width="10" height="3" rx="0.5" fill="#0D1117" stroke="#81C784" stroke-width="1.4"/>
  <line x1="12" y1="29" x2="12" y2="31" stroke="#81C784" stroke-width="1.2"/>
  <line x1="20" y1="29" x2="20" y2="31" stroke="#81C784" stroke-width="1.2"/>
  <!-- shoulder pivot -->
  <circle cx="16" cy="25" r="1.6" fill="#FFB74D"/>
  <!-- L1 (upper arm) -->
  <line x1="16" y1="25" x2="11" y2="16" stroke="#81C784" stroke-width="2.4" stroke-linecap="round"/>
  <!-- elbow joint -->
  <circle cx="11" cy="16" r="1.5" fill="#FFB74D"/>
  <!-- L2 (forearm) -->
  <line x1="11" y1="16" x2="20" y2="10" stroke="#81C784" stroke-width="2.4" stroke-linecap="round"/>
  <!-- wrist joint -->
  <circle cx="20" cy="10" r="1.4" fill="#FFB74D"/>
  <!-- gripper / end effector -->
  <line x1="20" y1="10" x2="25" y2="6" stroke="#81C784" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25" y1="6" x2="27" y2="3" stroke="#81C784" stroke-width="1.4"/>
  <line x1="25" y1="6" x2="28" y2="7" stroke="#81C784" stroke-width="1.4"/>
  <!-- workspace arc (faint reach indicator) -->
  <path d="M 4 18 Q 16 4 28 18" fill="none" stroke="#81C784" stroke-width="0.8" stroke-dasharray="1.5,2" opacity="0.45"/>
</svg>
